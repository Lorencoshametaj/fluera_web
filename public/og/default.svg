<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070c"/>
      <stop offset="55%" stop-color="#080b14"/>
      <stop offset="100%" stop-color="#0c111d"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.22" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#2d4ade" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#2d4ade" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.88" cy="0.82" r="0.45">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <linearGradient id="accentText" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#fafaf7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- top hairline -->
  <rect x="80" y="78" width="1040" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- logo + wordmark -->
  <g transform="translate(80, 100)">
    <image href="/assets/fluera_logo.png" x="0" y="0" width="48" height="48" preserveAspectRatio="xMidYMid meet"/>
    <text x="64" y="33" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#fafaf7" font-weight="500" letter-spacing="-0.3">Fluera</text>
  </g>

  <!-- kicker -->
  <g transform="translate(80, 220)">
    <text font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#38bdf8" letter-spacing="3" font-weight="500">
      COGNITIVE STUDY, SERIOUSLY
    </text>
  </g>

  <!-- headline -->
  <g transform="translate(80, 262)">
    <text font-family="Source Serif 4, Georgia, serif" font-size="92" font-weight="500" letter-spacing="-2.5">
      <tspan x="0" dy="0" fill="#fafaf7">The study space</tspan>
      <tspan x="0" dy="102" fill="#fafaf7">your brain was</tspan>
      <tspan x="0" dy="102" fill="url(#accentText)" font-style="italic">built for.</tspan>
    </text>
  </g>

  <!-- bottom hairline -->
  <rect x="80" y="555" width="1040" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- platforms -->
  <g transform="translate(80, 585)">
    <text font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#6b7280" letter-spacing="3.5" font-weight="400">
      iOS &#183; ANDROID &#183; MACOS &#183; WINDOWS &#183; LINUX &#183; WEB
    </text>
  </g>

  <!-- url -->
  <g transform="translate(1120, 585)">
    <text font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#6b7280" letter-spacing="1" text-anchor="end">
      fluera.dev
    </text>
  </g>
</svg>
